<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>易起長大｜寶寶成長日記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --purple: #6B4E8E;
  --purple-deep: #4E3768;
  --purple-soft: #C9BBE0;
  --purple-mist: #EFE9F6;
  --cream: #FBF7F1;
  --card: #FFFFFF;
  --apricot: #F3D2AC;
  --apricot-deep: #EBBE8A;
  --apricot-strong: #E3A15C;
  --ink: #453B54;
  --ink-soft: #8C81A0;
  --line: #ECE4F3;
  --green: #9CBB8C;
  --shadow: 0 8px 24px rgba(107,78,142,0.10);
  --shadow-sm: 0 4px 12px rgba(107,78,142,0.08);
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
body{margin:0; background:#E9E2F0; font-family:'Noto Sans TC', sans-serif; color:var(--ink);}
h1,h2,h3,.serif{font-family:'Noto Serif TC', serif;}
.num{font-family:'Quicksand',sans-serif; font-weight:700;}
button{font-family:inherit; cursor:pointer;}
::-webkit-scrollbar{display:none;}
*{scrollbar-width:none;}

.app{max-width:460px; margin:0 auto; background:var(--cream); min-height:100vh; position:relative; box-shadow:0 0 60px rgba(0,0,0,0.12); overflow-x:hidden;}
.topbar{position:sticky; top:0; z-index:30; background:rgba(251,247,241,0.92); backdrop-filter:blur(6px); display:flex; align-items:center; gap:10px; padding:14px 18px; border-bottom:1px solid var(--line);}
.topbar img{width:32px; height:32px; border-radius:50%;}
.topbar .title{font-weight:700; font-size:15px; color:var(--purple-deep);}
.topbar .sub{font-size:11px; color:var(--ink-soft);}

.page{display:none; padding-bottom:96px; animation:fadein .35s ease;}
.page.active{display:block;}
@keyframes fadein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

.section-pad{padding:20px 18px;}
.card{background:var(--card); border-radius:22px; box-shadow:var(--shadow-sm); padding:18px;}
.card-flat{background:var(--purple-mist); border-radius:22px; padding:18px;}

.btn{display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; border-radius:999px; padding:14px 20px; font-weight:700; font-size:14.5px; transition:transform .12s ease, box-shadow .12s ease; width:100%;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--purple); color:#fff; box-shadow:0 6px 16px rgba(107,78,142,0.28);}
.btn-apricot{background:var(--apricot-strong); color:#fff; box-shadow:0 6px 16px rgba(227,161,92,0.30);}
.btn-outline{background:#fff; color:var(--purple); border:1.5px solid var(--purple-soft);}
.btn-ghost{background:var(--purple-mist); color:var(--purple-deep);}
.btn-sm{padding:9px 14px; font-size:12.5px; width:auto;}

.chip{display:inline-flex; align-items:center; padding:7px 13px; border-radius:999px; font-size:12.5px; font-weight:600; background:var(--purple-mist); color:var(--purple-deep); border:1px solid transparent; white-space:nowrap;}
.chip.active{background:var(--purple); color:#fff;}
.chip-row{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 8px;}

.tag{font-size:10.5px; font-weight:700; padding:3px 9px; border-radius:999px; background:var(--apricot); color:#6b4a1f;}
.tag-soft{background:var(--purple-mist); color:var(--purple-deep);}

input, select, textarea{width:100%; border:1.5px solid var(--line); background:#fff; border-radius:14px; padding:12px 14px; font-size:14px; font-family:inherit; color:var(--ink);}
input:focus, select:focus, textarea:focus{outline:none; border-color:var(--purple-soft);}
label.field-label{font-size:12.5px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; display:block;}
.field{margin-bottom:14px;}

.segmented{display:flex; background:var(--purple-mist); border-radius:16px; padding:4px; gap:4px;}
.segmented button{flex:1; border:none; background:transparent; padding:10px 6px; border-radius:12px; font-weight:700; font-size:12.5px; color:var(--purple-deep);}
.segmented button.active{background:#fff; box-shadow:var(--shadow-sm); color:var(--purple);}

.bottomnav{position:fixed; bottom:0; left:0; right:0; max-width:460px; margin:0 auto; background:#fff; border-top:1px solid var(--line); display:flex; z-index:40; padding:8px 6px calc(8px + env(safe-area-inset-bottom));}
.navitem{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; padding:6px 0; color:var(--ink-soft); font-size:10.5px; font-weight:600;}
.navitem.active{color:var(--purple);}
.navitem svg{width:21px; height:21px;}

.grid2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
.feature-card{background:#fff; border-radius:20px; padding:16px 14px; box-shadow:var(--shadow-sm); display:flex; flex-direction:column; gap:8px;}
.feature-card .icon{width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; background:var(--purple-mist);}
.feature-card .icon svg{width:20px;height:20px;stroke:var(--purple);}

.icon-circle{width:44px; height:44px; border-radius:50%; background:var(--purple-mist); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
.icon-circle svg{width:22px; height:22px; stroke:var(--purple);}

.divider{height:1px; background:var(--line); margin:16px 0;}

.emoji-btn{display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 4px; border-radius:16px; border:1.5px solid var(--line); background:#fff; font-size:11.5px; font-weight:700; color:var(--ink-soft);}
.emoji-btn .em{font-size:26px;}
.emoji-btn.selected{border-color:var(--purple); background:var(--purple-mist); color:var(--purple-deep);}

.stamp{width:64px;height:64px;border-radius:50%;border:2px dashed var(--purple-soft); display:flex; align-items:center; justify-content:center; flex-direction:column; background:var(--purple-mist); flex-shrink:0;}
.stamp.locked{opacity:0.35; filter:grayscale(1);}
.stamp .em{font-size:22px;}

.timeline-track{display:flex; overflow-x:auto; gap:8px; padding:6px 2px 14px;}
.week-dot{min-width:46px; height:46px; border-radius:50%; background:#fff; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12.5px; color:var(--ink-soft); flex-direction:column;}
.week-dot.active{background:var(--purple); color:#fff; border-color:var(--purple);}
.week-dot span{font-size:8px; font-weight:600;}

.toast{position:fixed; left:50%; bottom:110px; transform:translateX(-50%) translateY(20px); background:var(--purple-deep); color:#fff; padding:12px 20px; border-radius:999px; font-size:13px; font-weight:600; box-shadow:0 8px 22px rgba(0,0,0,0.25); opacity:0; transition:all .3s ease; z-index:100; max-width:80%; text-align:center;}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

.notice{background:#FBF2E4; border:1px solid #EFDCB8; color:#7A5C22; font-size:11.5px; padding:10px 12px; border-radius:12px; line-height:1.6;}

.modal-bg{position:fixed; inset:0; background:rgba(45,32,60,0.45); z-index:200; display:none; align-items:flex-end; justify-content:center;}
.modal-bg.show{display:flex;}
.modal-sheet{max-width:460px; width:100%; background:var(--cream); border-radius:26px 26px 0 0; max-height:88vh; overflow-y:auto; padding:20px 18px calc(28px + env(safe-area-inset-bottom)); animation:slideup .3s ease;}
@keyframes slideup{from{transform:translateY(30px); opacity:0;} to{transform:translateY(0); opacity:1;}}
.modal-handle{width:38px; height:4px; background:var(--line); border-radius:99px; margin:0 auto 14px;}

.avatar-photo{width:100%; aspect-ratio:1/1; border-radius:18px; object-fit:cover; background:linear-gradient(135deg,var(--purple-soft),var(--apricot));}

table{width:100%; border-collapse:collapse; font-size:12.5px;}
th{text-align:left; color:var(--ink-soft); font-weight:700; padding:8px 6px; border-bottom:1.5px solid var(--line); font-size:11px;}
td{padding:9px 6px; border-bottom:1px solid var(--line);}

.progress-bar{height:8px; background:var(--purple-mist); border-radius:99px; overflow:hidden;}
.progress-bar .fill{height:100%; background:linear-gradient(90deg,var(--purple),var(--apricot-strong)); border-radius:99px;}

.hero-shape{position:absolute; top:-40px; right:-60px; width:220px; height:220px; border-radius:50%; background:radial-gradient(circle at 30% 30%, var(--purple-soft), transparent 70%); opacity:0.5; z-index:0;}

::placeholder{color:#C4B9D6;}
.small{font-size:11.5px; color:var(--ink-soft);}
.hidden{display:none !important;}
</style>
</head>

function postStageBlurb(){
  const s = POST_STAGES[state.selectedStage];
  return `這個階段的寶寶正在發展：${s.fields.slice(0,4).join('、')}。持續紀錄能幫助你更了解${state.profile.babyNick}的成長節奏。`;

function growthDays(){
  if(state.mode==='pregnant') return Math.max(state.profile.weekPregnant*7 - 14, 0);
  const d = new Date(state.profile.birthDate); const now = new Date('2026-07-14');
  return Math.max(Math.round((now-d)/86400000),0);
}
function monthAge(){
  const d = new Date(state.profile.birthDate); const now = new Date('2026-07-14');
  let months = (now.getFullYear()-d.getFullYear())*12 + (now.getMonth()-d.getMonth());
  return months + '個月';
}

      </div>`).join('')}
    <div class="notice">為維護友善交流空間，請勿留下私人電話、發布外部銷售連結、進行醫療診斷、攻擊其他使用者，或宣稱產品可治療疾病。留言將於審核後顯示。</div>
  </div>`;
}
function submitComment(idx, q){
  const val = $('input-'+idx).value;
  if(!val) return;
  state.commentsPending.push({ id:'c'+Date.now(), q, user:state.profile.momNick, text:val, status:'pending' });
  $('input-'+idx).value='';
  toast('留言已送出，將於審核後顯示');
}

function statCard(label, val, sub){
  return `<div class="card"><div class="small">${label}</div><div class="serif num" style="font-size:22px; color:var(--purple-deep); margin:4px 0;">${val}</div><div class="small">${sub}</div></div>`;

function moderateComment(id, status){
  const c = state.commentsPending.find(c=>c.id===id);
  c.status = status;
  toast(status==='approved' ? '留言已核准並顯示' : '留言已拒絕');
  paintAdminBody();
}
